<!doctype html>
<html lang="en">
<head>
  <title>Something Went Wrong - Canada Unique</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    body {
      background: #f9f9f9;
      color: #333;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
    }

    .maple {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .error-code {
      font-size: 5rem;
      font-weight: 800;
      color: #d52b1e;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0.75rem 0 0.5rem;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-block;
      background: #d52b1e;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover { background: #b5241a; }

    .brand {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="maple">🍁</div>
    <div class="error-code">500</div>
    <h1>Oops, something went wrong on our end!</h1>
    <p>We're working on fixing this — sorry for the inconvenience. Please try again in a moment.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="brand">Canada Unique</div>
  </div>
</body>
</html>
